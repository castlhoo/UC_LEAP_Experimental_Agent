# Step 1: Candidate Paper Search
# ==============================

gpt:
  enabled: true
  model: "gpt-5.4-mini"

queries:
  topic_keywords:
    # Topological & quantum phases
    - "topological insulator"
    - "topological superconductor"
    - "Weyl semimetal"
    - "Dirac semimetal"
    - "Majorana"
    - "skyrmion"
    - "spin-orbit coupling"
    - "vortex"
    - "Josephson junction"
    - "Mott insulator"
    - "heavy fermion"
    - "Kondo"
    - "spin liquid"
    - "frustrated magnet"
    # Superconductors
    - "cuprate"
    - "nickelate"
    - "iron-based superconductor"
    - "superconducting gap"
    # 2D / van der Waals
    - "graphene"
    - "TMD"
    - "moiré"
    - "twisted bilayer"
    - "heterostructure"
    - "van der Waals"
    - "2D material"
    # Ordering & transitions
    - "charge density wave"
    - "phase transition"
    - "magnetic anisotropy"
    - "exchange bias"
    # Functional materials
    - "ferroelectric"
    - "multiferroic"
    - "thermoelectric"
    - "piezoelectric"
    # Physical observables
    - "Fermi surface"
    - "band structure"
    - "lattice constant"
    - "quantum oscillation"
  experiment_keywords:
    # Spectroscopy & microscopy
    - "STM"
    - "STS"
    - "ARPES"
    - "SET"
    - "EELS"
    - "Raman"
    - "tunneling spectroscopy"
    - "point-contact spectroscopy"
    - "neutron scattering"
    # Diffraction & imaging
    - "XRD"
    - "TEM"
    - "AFM"
    # Growth & fabrication
    - "MBE"
    - "PLD"
    - "CVD"
    - "sputtering"
    - "exfoliation"
    - "flux growth"
    - "Bridgman"
    # Sample forms
    - "thin film"
    - "single crystal"
    - "bulk crystal"
    # Transport & thermodynamic
    - "magnetoresistance"
    - "Hall effect"
    - "specific heat"
    - "de Haas-van Alphen"
    - "Shubnikov-de Haas"
    - "electronic transport"
    - "thermal transport"
    - "thermal coefficient"
  data_keywords:
    - "source data"
    - "dataset"
    - "data availability"
    - "repository"
    - "zenodo"
    - "figshare"
    - "supplementary data"

search:
  year_range:
    start: 2015
    end: 2026
  max_results_per_query: 20
  enabled_apis:
    semantic_scholar: false
    openalex: true
    crossref: true
    arxiv: true
    europe_pmc: false
  max_queries_per_api:
    semantic_scholar: 5
    openalex: 20
    crossref: 10
    arxiv: 25
    europe_pmc: 12
  rate_limits:
    semantic_scholar: 8.0
    openalex: 0.3
    crossref: 1.0
    arxiv: 3.0
    europe_pmc: 0.3
  retry_policy:
    semantic_scholar_backoffs: [15, 30, 60, 120, 180]
    semantic_scholar_max_attempts: 6

journals:
  high_priority:
    - "Nature"
    - "Science"
    - "Nature Physics"
    - "Nature Materials"
    - "Nature Communications"
    - "Physical Review Letters"
    - "Advanced Materials"
  mid_priority:
    - "Physical Review B"
    - "npj Quantum Materials"
    - "ACS Nano"
    - "Nano Letters"
    - "2D Materials"
    - "Applied Physics Letters"
    - "Science Advances"

scoring:
  weights:
    field_match_strong: 3
    field_match_general: 2
    field_match_weak: 1
    experimental_clear: 3
    experimental_mixed: 1
    theory_only_penalty: -3
    dataset_signal_high: 3
    dataset_signal_medium: 1
    soft_material_penalty: -4
    review_penalty: -4
  thresholds:
    keep_min: 7
    maybe_min: 4
