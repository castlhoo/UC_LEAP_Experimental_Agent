# Step 3.5: Script-Assisted Type1 Reproduction
# ============================================

input_file: "step3/output/step3_classification_latest.json"
output_dir: "step3_5/output"
work_dir: "step3_5/work"

selection:
  require_type2: true
  require_scripts: true
  max_papers: null

prompt:
  enabled: true
  model: "gpt-5.4-mini"
  temperature: 0.1

execution:
  timeout_sec: 180
  python_command: "python"
  notebook_command: "jupyter nbconvert --to notebook --execute"
  keep_workdir: true

outputs:
  reusable_extensions:
    - ".csv"
    - ".tsv"
    - ".txt"
    - ".xlsx"
    - ".xls"
    - ".json"
    - ".npy"
    - ".npz"
    - ".mat"
  image_only_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".pdf"
    - ".svg"
