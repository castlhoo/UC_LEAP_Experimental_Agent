# Step 4: Dataset Download, Inspection & Type Classification
# ===========================================================

# Inputs
step2_input_file: "step2/output/step2_inventory_latest.json"
step3_input_file: "step3/output/step3_paper_analysis_latest.json"

# Output directory
output_dir: "step4/output"

# Download directory for dataset files
download_dir: "step4/downloads"

# Resume settings
resume:
  reuse_existing_downloads: true
  skip_completed_papers: true
  reprocess_failed_classifications: true
  reprocess_neither_with_data_files: true

# Step 3 stores the main paper PDFs here; Step 4 copies them into each paper's pdf/ folder.
step3_paper_dir: "step3/papers"

# GPT settings for Prompt B
gpt:
  enabled: true
  model: "gpt-5.4-mini"
  batch_size: 6

# HTTP settings
http:
  timeout: 60
  user_agent: "UC_LEAP_Step4/1.0 (dataset-classification)"
  rate_limit_delay: 1.0

# Download limits
download:
  max_file_size_mb: 500
  max_files_per_paper: 50
  allowed_extensions:
    - ".csv"
    - ".xlsx"
    - ".xls"
    - ".txt"
    - ".dat"
    - ".tsv"
    - ".h5"
    - ".hdf5"
    - ".nxs"
    - ".zip"
    - ".tar.gz"
    - ".tar"
    - ".tgz"
    - ".gz"
    - ".json"
    - ".xml"
    - ".md"
    - ".rst"
    - ".yaml"
    - ".yml"
    - ".npz"
    - ".npy"
    - ".mat"
    - ".spe"
    - ".pdf"
    - ".tif"
    - ".tiff"
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".sxm"
    - ".ibw"
    - ".py"
    - ".m"
    - ".ipynb"
    - ".r"
  skip_extensions:
    - ".mp4"
    - ".avi"
    - ".mov"
    - ".gif"
    - ".svg"

# File inspection settings
inspection:
  csv_preview_rows: 10
  max_columns_display: 30
  h5_max_datasets: 50
  zip_max_entries: 100
