##Measuring at 15dBatt on the laser at 1546.88nm.
##Using same fiber for everything until we get to APC/FC fibers.  
#Generally always measuring on thru channel after moving past switch, and measured fridge output after all switch losses   
# Powermeter head has been verified against integrating sphere
##
#See 20230113_setup_labeled_loss_measurement.xlsx for labeled stage map.     

laser: 
  label: A # Measuring directly at the laser 
  reported: 
      power: -2.32
  measured:
      power: -2.15
 
ssbm in:
  label: B #measuring at input to polarization controllers before SSBM, in quadrature 
  power: -2.15

SW-M2: 
  input:
    label: C #measuring at input of switch 
    power: -12.51
  CH5:
    edfa in: 
      label: A5 #input to edfa 
      power: -13.04
    edfa out:
      label: C5 #input to filter 
      current: 110 #mA
      power: -12.06
    aom in:
      label: D5 #input to PCs before AOM
      power: -14.56
    aom out:
      label: B5 # output of AOM in HIGH state, measured at switch input 
      power: -18.93
  CH6:
    label: D #measured on SW-M2 thru channel at input of PCs before fridge
    power: -14.12
SW-M1:
  input:
    label: E #measuring input of switch SW-M1
    power: -14.34
  CH1:
    fridge in: 
      label: O #measured at input of fridge, forgot to label diagram
      power: -15.13 
    fridge out:
      label: P #measured at output of fridge, using same mating sleeve 
      power: -35.29
    fiber loss: #measured while warm, transmission losses from outside of fridge to output of grating coupler array using telecom free space detector.  See 20230105_warm_checks.ipynb
      input: 2.04
      output: 2.67
  outputs:
    label: F # Measured at input of 90/10 coupler
    CH1:
      power: -37.28 #fixed 20230412, copied over incorrectly.  see image. 
    CH2: 
      power: -16.37
var gain:
  label: G # measuring 10% output of 90/10 coupler at input of var gain detector 
  power: -26.91
SW-M3:
  input: 
    label: H # input to SW-M3
    power: -17.20
  125 MHz:
    label: I # measuring at input of 125 MHz detector 
    power: -17.98
  output:
    label: J # switch output on thru channel, measuring at input of JDSU switch 
    power: -18.71
JDSU:
  OSA:
    label: K # OSA fiber 
    power: -21.06
  12 GHz:
    label: L #input to 12GHz detector
    power: -19.41
  powermeter:
    label: M # input to powermeter. Reported same on handheld detector and one in setup. 
    power: -19.32

dicon: # from LoncarGroup\Equipment Inventory\Dicon GP700\Dicon GP700 loss data.gsheet
  SW-1:
    M1:
      A: -.6
      B: -.32
    M2: 
      A: -0.66 
      B: -0.8 
    M6:
      A: -0.58
      B: -0.43  

analysis:
  loss from SW1: 
    label: M-E # normalizing to input of SW before fridge/etc
    gain: -4.98 
  loss to fridge:
    label: O-E # loss on fiber between fridge input and SW-M1 input 
    gain: -0.79 
  loss ceo vs thru:
    label: independent #previously characterized
    gain: 0.54 
  pm fast correction: 
    label: M - L
    gain: -0.02
  grating correction:
    label: (fiber loss input - fiber loss output)/2
    gain: 0.315




