# Step 3: Paper Analysis
# ======================

# Input: Step 2 output
input_file: "step2/output/step2_inventory_latest.json"

# Output directory
output_dir: "step3/output"

# PDF/text extraction directory
download_dir: "step3/papers"

# Only papers with confirmed data are eligible for paper analysis.
include_statuses:
  - "verified"
  - "source_data_found"

# GPT settings
gpt:
  enabled: true
  model: "gpt-5.4-mini"

# HTTP settings
http:
  timeout: 60
  user_agent: "UC_LEAP_Step3/1.0 (paper-analysis)"
  rate_limit_delay: 1.0
